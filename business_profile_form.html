<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title-tag">Business profile &mdash; Gati Billing (Demo)</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] }, colors: {
    govblue:'#1d70b8',govblack:'#0b0c0c',govgray:'#505a5f',govborder:'#b1b4b6',govbg:'#f3f2f1',
    govsuccess:'#00703c',govwarn:'#d4351c',govfocus:'#ffdd00',govyellow:'#fff7d3' } } } };
</script>
<link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-white text-govblack font-sans min-h-screen flex flex-col">
<div id="site-header"></div>

<main class="flex-1 max-w-6xl mx-auto w-full px-6 py-10">
  <span class="text-govgray text-base block mb-1">Business profiles</span>
  <h1 class="text-govblack text-3xl font-bold mb-8" id="page-title">Add a business profile</h1>

  <div class="border border-govborder p-6 max-w-2xl">
    <form id="business-form">
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="business_name">Business name</label>
        <input type="text" id="business_name" class="gati-input" required>
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="business_email">Email address</label>
        <input type="email" id="business_email" class="gati-input">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="business_contact_number">Contact number</label>
        <input type="tel" id="business_contact_number" class="gati-input">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="gst_number">GST number <span class="text-govgray font-normal">(optional)</span></label>
        <input type="text" id="gst_number" class="gati-input">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="business_address">Business address</label>
        <textarea id="business_address" class="gati-input"></textarea>
      </div>

      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="logo">Logo <span class="text-govgray font-normal">(optional)</span></label>
        <img id="logo-preview" class="hidden mb-2" style="max-height:48px;">
        <input type="file" id="logo" accept="image/*"
          class="w-full border-2 border-govblack px-3 py-2 text-govblack text-base bg-white rounded-none file:mr-4 file:py-1 file:px-3 file:border-0 file:bg-govbg file:text-govblack file:font-semibold file:text-sm cursor-pointer">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="signature">Signature <span class="text-govgray font-normal">(optional)</span></label>
        <img id="signature-preview" class="hidden mb-2" style="max-height:48px;">
        <input type="file" id="signature" accept="image/*"
          class="w-full border-2 border-govblack px-3 py-2 text-govblack text-base bg-white rounded-none file:mr-4 file:py-1 file:px-3 file:border-0 file:bg-govbg file:text-govblack file:font-semibold file:text-sm cursor-pointer">
      </div>

      <p class="text-govgray text-sm mb-2 font-semibold">Default payment details (auto-filled onto new invoices)</p>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="bank_name">Bank name</label>
        <input type="text" id="bank_name" class="gati-input">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="account_name">Account name</label>
        <input type="text" id="account_name" class="gati-input">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="account_number">Account number</label>
        <input type="text" id="account_number" class="gati-input">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="upi_id">UPI ID</label>
        <input type="text" id="upi_id" class="gati-input">
      </div>
      <div class="gov-field mb-6">
        <label class="block font-bold text-govblack text-base mb-1" for="ifsc_code">IFSC code</label>
        <input type="text" id="ifsc_code" class="gati-input">
      </div>

      <div class="mt-8 flex items-center">
        <button type="submit" class="bg-govblue text-white font-bold px-6 py-3 border-2 border-govblue rounded-none hover:bg-[#1861a0]">Save profile</button>
        <a href="business_profile_list.html" class="text-govblue underline hover:decoration-2 ml-4">Cancel</a>
      </div>
    </form>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/db.js"></script>
<script src="js/loader.js"></script>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script>
  initLoader();
  if (renderLayout({ requireAuth: true })) {
    const id = qs('id');
    const existing = id ? DemoDB.getBusiness(id) : null;
    let logoData = null, signatureData = null;

    if (existing) {
      document.getElementById('page-title').textContent = 'Edit business profile';
      document.getElementById('page-title-tag').textContent = 'Edit business profile — Gati Billing (Demo)';
      ['business_name','business_email','business_contact_number','gst_number','business_address',
       'bank_name','account_name','account_number','upi_id','ifsc_code'].forEach(function (f) {
        if (existing[f]) document.getElementById(f).value = existing[f];
      });
      if (existing.logo) {
        logoData = existing.logo;
        document.getElementById('logo-preview').src = existing.logo;
        document.getElementById('logo-preview').classList.remove('hidden');
      }
      if (existing.signature) {
        signatureData = existing.signature;
        document.getElementById('signature-preview').src = existing.signature;
        document.getElementById('signature-preview').classList.remove('hidden');
      }
    }

    document.getElementById('business-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const name = document.getElementById('business_name').value.trim();
      if (!name) { alert('Business name is required.'); return; }

      const logoFile = document.getElementById('logo').files[0];
      const signatureFile = document.getElementById('signature').files[0];
      if (logoFile) logoData = await fileToBase64(logoFile);
      if (signatureFile) signatureData = await fileToBase64(signatureFile);

      const data = {
        id: existing ? existing.id : undefined,
        business_name: name,
        business_email: document.getElementById('business_email').value,
        business_contact_number: document.getElementById('business_contact_number').value,
        gst_number: document.getElementById('gst_number').value,
        business_address: document.getElementById('business_address').value,
        bank_name: document.getElementById('bank_name').value,
        account_name: document.getElementById('account_name').value,
        account_number: document.getElementById('account_number').value,
        upi_id: document.getElementById('upi_id').value,
        ifsc_code: document.getElementById('ifsc_code').value,
        logo: logoData,
        signature: signatureData,
      };
      DemoDB.saveBusiness(data);
      window.location.href = 'business_profile_list.html';
    });
  }
</script>
</body>
</html>
